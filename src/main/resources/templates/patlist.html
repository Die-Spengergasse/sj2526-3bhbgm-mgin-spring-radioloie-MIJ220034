<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patientenliste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Radiologie-Institut</a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h2 class="h4 mb-0">Registrierte Patienten</h2>
                <a href="/patient/add" class="btn btn-sm btn-success">+ Neuer Patient</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>SV-Nummer</th>
                                <th>Vorname</th>
                                <th>Nachname</th>
                                <th>Geschlecht</th>
                                <th>Geburtsdatum</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${patients}">
                                <td th:text="${p.svn}"></td>
                                <td th:text="${p.firstName}"></td>
                                <td th:text="${p.lastName}"></td>
                                <td th:text="${p.gender}"></td>
                                <td th:text="${p.birthDate}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(patients)}">
                                <td colspan="5" class="text-center py-4 text-muted">Keine Patienten registriert.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white">
                <a href="/" class="btn btn-outline-secondary">Zurück zum Start</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
