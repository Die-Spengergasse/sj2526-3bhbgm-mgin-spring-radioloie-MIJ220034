<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patient registrieren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Radiologie-Institut</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h2 class="h4 mb-0">Neuen Patienten registrieren</h2>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/patient/add}" th:object="${patient}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Sozialversicherungsnummer</label>
                                <input type="text" th:field="*{svn}" class="form-control" placeholder="1234010170" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Vorname</label>
                                    <input type="text" th:field="*{firstName}" class="form-control" placeholder="Vorname" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Nachname</label>
                                    <input type="text" th:field="*{lastName}" class="form-control" placeholder="Nachname" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Geschlecht</label>
                                <select th:field="*{gender}" class="form-select" required>
                                    <option value="" selected disabled>Bitte wählen...</option>
                                    <option value="M">Männlich</option>
                                    <option value="W">Weiblich</option>
                                    <option value="D">Divers</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Geburtsdatum</label>
                                <input type="date" th:field="*{birthDate}" class="form-control" required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="/" class="btn btn-outline-secondary">
                                    <i class="bi bi-arrow-left"></i> Zurück zum Start
                                </a>
                                <button type="submit" class="btn btn-primary px-4">Registrieren</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
